name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  title:
    name: Validate Title
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pattern = /^(feat|fix|chore|docs|refactor|test|perf|ci|build|style|revert)(\(.+\))?!?:\s.+/
            const title = context.payload.pull_request.title
            if (!pattern.test(title)) {
              core.setFailed(
                `PR title "${title}" does not match conventional commit format.\n` +
                'Expected: type(scope)!: description\n' +
                'Types: feat, fix, chore, docs, refactor, test, perf, ci, build, style, revert'
              )
            }

  labels:
    name: Validate Labels
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const required = ['semver-patch', 'semver-minor', 'semver-major']
            const labels = context.payload.pull_request.labels.map(l => l.name)
            const hasSemver = required.some(r => labels.includes(r))
            if (!hasSemver) {
              core.setFailed(
                'PR must have a semver label: semver-patch, semver-minor, or semver-major'
              )
            }

  size:
    name: Check Size
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process')
            const diff = execSync('git diff --stat origin/master...HEAD').toString()
            const lines = diff.trim().split('\n').pop()
            const match = lines?.match(/(\d+)/)
            const changes = match ? parseInt(match[1]) : 0
            const limit = 500
            if (changes > limit) {
              core.warning(
                `Large PR: ${changes} changes (limit is ${limit}). ` +
                'Consider splitting into smaller PRs for faster review.'
              )
            }
            core.setOutput('changes', changes.toString())

  assign:
    name: Auto Assign
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login
            if (context.payload.pull_request.assignees.length === 0) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: [author]
              })
            }
