name: Release binaries

# Cross-compile the bundler's native analysis addon (napi) on tag and attach it to
# the GitHub release. The `vibe` CLI and the whole runtime ship as npm packages;
# the `.vibe` language + its Rust compiler/LSP/wasm were retired — Vibe apps are
# plain TypeScript, and the addon is an optional accelerator for `vibe/build`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  napi:
    name: napi ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build addon
        run: cargo build --release -p vibe_napi --features node --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          LIB="$(ls target/${{ matrix.target }}/release/*vibe_napi.* 2>/dev/null | grep -E '\.(dylib|so|dll)$' | head -1)"
          tar -czf "vibe-napi-${{ matrix.target }}.tar.gz" -C "$(dirname "$LIB")" "$(basename "$LIB")"
      - uses: actions/upload-artifact@v4
        with:
          name: vibe-napi-${{ matrix.target }}
          path: vibe-napi-${{ matrix.target }}.tar.gz

  release:
    name: Attach to release
    needs: [napi]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Publish to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
