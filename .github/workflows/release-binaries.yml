name: Release binaries

# Cross-compile the `vibe` CLI, the napi addon, and the wasm module on tag, then
# attach them to the GitHub release. Publishing the npm platform packages
# (@vibe/cli-<platform>, @vibe/compiler-<platform>, @vibe/wasm) happens after.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cli:
    name: CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p vibe_cli --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/vibe"
          [ "${{ runner.os }}" = "Windows" ] && BIN="$BIN.exe"
          tar -czf "vibe-${{ matrix.target }}.tar.gz" -C "$(dirname "$BIN")" "$(basename "$BIN")"
      - uses: actions/upload-artifact@v4
        with:
          name: vibe-${{ matrix.target }}
          path: vibe-${{ matrix.target }}.tar.gz

  napi:
    name: napi ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build addon
        run: cargo build --release -p vibe_napi --features node --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: vibe_napi-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/*vibe_napi*

  wasm:
    name: wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli
      - name: Build
        run: |
          cargo build --release -p vibe_wasm --features wasm --target wasm32-unknown-unknown
          wasm-bindgen target/wasm32-unknown-unknown/release/vibe_wasm.wasm --out-dir pkg --target web
      - uses: actions/upload-artifact@v4
        with:
          name: vibe-wasm
          path: pkg

  release:
    name: Attach to release
    needs: [cli, napi, wasm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Publish to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
