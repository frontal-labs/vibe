# Cargo configuration for the Vibe native addon.
[alias]
# The Rust side is the bundler's static-analysis addon, not a language compiler.
# `cargo addon` builds the napi `.node` addon (vibe_napi) for the current platform;
# `@vibe/build` loads it to accelerate its agent‚Üítool graph analysis (optional ‚Äî
# point `VIBE_NATIVE_ADDON` at the resulting library, or omit it for the pure-TS path).
addon = "build --package vibe_napi --features node --release"
