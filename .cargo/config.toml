# Cargo configuration for the Vibe language toolchain.
[alias]
# The `vibe` CLI is now a TypeScript package (`@vibe/cli`) that drives the compiler
# through the napi addon. `cargo addon` builds that addon for the current platform;
# `@vibe/compiler` loads it (point `VIBE_NATIVE_ADDON` at the resulting library).
addon = "build --package vibe_napi --features node --release"
